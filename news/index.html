  <script>
  function toggleTheme(){var h=document.documentElement;h.classList.toggle('dark');localStorage.setItem('theme',h.classList.contains('dark')?'dark':'light');}

  function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function fmtDate(pubDate){try{var d=new Date(pubDate);var diff=Date.now()-d.getTime();var h=diff/1000/60/60;if(h<1)return '방금 전';if(h<24)return Math.floor(h)+'시간 전';var days=Math.floor(h/24);if(days<7)return days+'일 전';return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');}catch(e){return '';}}

  function renderHero(item){
    var hero=document.getElementById('news-hero');
    if(!item){hero.innerHTML='<div class="absolute inset-0 flex items-center justify-center text-slate-300 text-sm">표시할 기사가 없습니다.</div>';return;}
    hero.innerHTML=
      '<a href="'+escapeHtml(item.link)+'" target="_blank" rel="noopener" class="block h-full relative">'+
        '<div class="absolute inset-0 bg-[radial-gradient(circle_at_30%_20%,rgba(59,130,246,0.35),transparent_60%)]"></div>'+
        '<div class="relative h-full flex flex-col justify-end p-6 md:p-10 max-w-3xl">'+
          '<span class="inline-block self-start px-3 py-1 mb-4 rounded-lg bg-white/15 text-white text-[11px] font-semibold backdrop-blur">HOT NEWS</span>'+
          '<h3 class="font-headline text-2xl md:text-4xl font-bold text-white mb-3 leading-tight line-clamp-3">'+escapeHtml(item.title)+'</h3>'+
          '<p class="text-slate-200 line-clamp-2 mb-4 text-sm md:text-base">'+escapeHtml(item.description)+'</p>'+
          '<div class="flex items-center gap-3 text-xs"><span class="text-slate-300">'+escapeHtml(item.source)+'</span><span class="w-1 h-1 rounded-full bg-slate-500"></span><span class="text-slate-300">'+fmtDate(item.pubDate)+'</span></div>'+
        '</div>'+
      '</a>';
  }

  function renderGrid(items){
    var grid=document.getElementById('news-grid');
    if(!items||items.length===0){grid.innerHTML='<div class="col-span-full text-center py-8 text-muted text-sm">기사가 없습니다.</div>';return;}
    grid.innerHTML=items.map(function(item){
      return '<a href="'+escapeHtml(item.link)+'" target="_blank" rel="noopener" class="flex flex-col gap-2 p-5 rounded-3xl bg-surface-container border border-outline-variant/10 hover:border-outline-variant/30 transition-colors">'+
        '<span class="text-primary-container dark:text-primary text-[11px] font-semibold">'+escapeHtml(item.source||'NEWS')+'</span>'+
        '<h4 class="font-headline text-base font-semibold text-on-surface line-clamp-2">'+escapeHtml(item.title)+'</h4>'+
        '<p class="text-on-surface-variant text-sm line-clamp-2">'+escapeHtml(item.description)+'</p>'+
        '<span class="text-outline text-[11px] mt-1">'+fmtDate(item.pubDate)+'</span>'+
      '</a>';
    }).join('');
  }

  async function loadNews(category){
    var grid=document.getElementById('news-grid');
    var hero=document.getElementById('news-hero');
    grid.innerHTML='<div class="col-span-full text-center py-8 text-muted text-sm">불러오는 중…</div>';
    hero.innerHTML='<div class="absolute inset-0 flex items-center justify-center text-slate-300 text-sm">불러오는 중…</div>';
    try{
      var resp=await fetch('/api/news?category='+encodeURIComponent(category));
      var data=await resp.json();
      if(!resp.ok){throw new Error(data.error||'fetch_failed');}
      renderHero(data.items[0]);
      renderGrid(data.items.slice(1));
    }catch(e){
      var msg = (e&&e.message==='API_KEY_MISSING')?'뉴스 API 키가 설정되지 않았습니다. 관리자 설정을 확인해주세요.':'뉴스 불러오기에 실패했습니다. 잠시 후 다시 시도해주세요.';
      grid.innerHTML='<div class="col-span-full text-center py-8 text-muted text-sm">'+msg+'</div>';
      hero.innerHTML='<div class="absolute inset-0 flex items-center justify-center text-slate-300 text-sm">'+msg+'</div>';
    }
  }

  function setupCategories(){
    var buttons=document.querySelectorAll('#category-filters [data-category]');
    buttons.forEach(function(btn){
      btn.addEventListener('click',function(){
        buttons.forEach(function(b){b.classList.remove('bg-primary-container','text-white');b.classList.add('bg-surface-container-high','text-on-surface-variant');});
        btn.classList.remove('bg-surface-container-high','text-on-surface-variant');
        btn.classList.add('bg-primary-container','text-white');
        loadNews(btn.dataset.category);
      });
    });
  }

  document.addEventListener('DOMContentLoaded',function(){setupCategories();loadNews('all');});
  </script>
